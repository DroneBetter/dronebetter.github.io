<style type="text/css">
  html {background-color: #000000;}
  body {background-color: #000000; color: #ffffff; font-family: monospace; /*margin-top:32px;margin-bottom:32px;margin-right:64px;margin-left:64px;*/}
  a:link {color: #00ffff;}
  a:visited {color: #ffff00;}
  /*use #ff00ff for deadlinks or archive.org maybe*/
  oeissectname {font-family: serif;}
  dt {display: list-item; list-style-type: disc; list-style-position: inside; padding-left: 16px} /*making this modification without specifying the padding causes the dt's padding-left to be truncated; when replacing it, list-style-position prevents the bullet point from being left behind*/
  details > *:not(summary){margin-left: 1em;}
  :root{--name-width: 5ch; /* longest username */ --gap: 1ch}
  .chat {line-height: 1.4}
  .msg {
    position: relative;
    padding-left: calc(var(--name-width) + var(--gap));
    margin: 0.25rem 0}
  .name {
    position: absolute;
    left: 0;top: 0;
    width: var(--name-width);
    text-align: right;
    padding-right: var(--gap);
    font-weight: 700;
    white-space: nowrap;
    display: inline-block;
    color: var(--name-color, inherit)}
</style>
<script>
  class OEIS extends HTMLElement {
    constructor() {super(); this._inited=false;}
  
    connectedCallback() {
      if (this._inited) return;
      setTimeout(()=>this._init(),0);}
  
    _init() {
      if (this._inited) return;
      this._inited=true;
      const suffix=this.getAttribute("href");
      const a=document.createElement("a");
      a.href="https://oeis.org/"+suffix;
      if (this.childNodes.length) {while (this.firstChild) a.appendChild(this.firstChild);}
      else {a.textContent=suffix;}
      this.appendChild(a);}}
  customElements.define("oe-is",OEIS);
  class Ocmo extends HTMLElement {
    constructor() {super(); this._inited=false;}
  
    connectedCallback() {
      if (this._inited) return;
      setTimeout(()=>this._init(),0);}
  
    _init() {
      if (this._inited) return;
      this._inited=true;
      const suffix=this.getAttribute("href");
      const style=this.getAttribute("style");
      const a=document.createElement("a");
      const channel=["368348645382291469","380424544047071242","691241596036972604","691931146971381761"][this.getAttribute("c") ?? 2]
      a.href="https://discord.com/channels/368348645382291466/"+channel+"/"+suffix;
      a.style=style;
      if (this.childNodes.length) {while (this.firstChild) a.appendChild(this.firstChild);}
      else {a.textContent="message "+suffix;}
      this.appendChild(a);}}
  customElements.define("oc-mo",Ocmo);
  
  class wikipedia extends HTMLElement {
    constructor() {super(); this._inited=false;}
  
    connectedCallback() {
      if (this._inited) return;
      setTimeout(()=>this._init(),0);}
  
    _init() {
      if (this._inited) return;
      this._inited=true;
      const suffix=this.getAttribute("href");
      const a=document.createElement("a");
      a.href="https://en.wikipedia.org/wiki/"+suffix;
      if (this.childNodes.length) {while (this.firstChild) a.appendChild(this.firstChild);}
      else {a.textContent=suffix.replace(/_/g,' ');}
      this.appendChild(a);}}
  customElements.define("wi-ki",wikipedia);

  class OEISTally extends HTMLElement {
    constructor() {super(); this._inited=false;}
  
    connectedCallback() {
      if (this._inited) return;
      setTimeout(()=>this._init(),0);}
  
    _init() {
      if (this._inited) return;
      this._inited=true;
      const suffix=this.getAttribute("href");
      const a=document.createElement("a");
      a.href="https://oeis.org/wiki/User:Natalia_L._Skirrow"+(suffix?(suffix[0]=='#'?'':'/')+suffix:'');
      if (this.childNodes.length) {while (this.firstChild) a.appendChild(this.firstChild);}
      else {a.textContent=suffix?suffix.replace(/_/g,' '):"OEISwiki userpage";}
      this.appendChild(a);}}
  customElements.define("oeis-tally",OEISTally); /*btw this thing needs to be italicised whenever self-closing with <oeis-tally ... /> or it will break horrifically btw*/
</script>

<script> // transcluded from https://ignorethecode.net/blog/2010/04/20/footnotes/
  // this script requires jQuery
$(document).ready(function() {
    Footnotes.setup();
});

var Footnotes = {
    footnotetimeout: false,
    setup: function() {
        var footnotelinks = $("a[rel='footnote']")
        
        footnotelinks.unbind('mouseover',Footnotes.footnoteover);
        footnotelinks.unbind('mouseout',Footnotes.footnoteoout);
        
        footnotelinks.bind('mouseover',Footnotes.footnoteover);
        footnotelinks.bind('mouseout',Footnotes.footnoteoout);
    },
    footnoteover: function() {
        clearTimeout(Footnotes.footnotetimeout);
        $('#footnotediv').stop();
        $('#footnotediv').remove();
        
        var id = $(this).attr('href').substr(1);
        var position = $(this).offset();
    
        var div = $(document.createElement('div'));
        div.attr('id','footnotediv');
        div.bind('mouseover',Footnotes.divover);
        div.bind('mouseout',Footnotes.footnoteoout);

        var el = document.getElementById(id);
        div.html($(el).html());
        
        div.css({
            position:'absolute',
            width:'400px',
            opacity:0.9
        });
        $(document.body).append(div);

        var left = position.left;
        if(left + 420  > $(window).width() + $(window).scrollLeft())
            left = $(window).width() - 420 + $(window).scrollLeft();
        var top = position.top+20;
        if(top + div.height() > $(window).height() + $(window).scrollTop())
            top = position.top - div.height() - 15;
        div.css({
            left:left,
            top:top
        });
    },
    footnoteoout: function() {
        Footnotes.footnotetimeout = setTimeout(function() {
            $('#footnotediv').animate({
                opacity: 0
            }, 600, function() {
                $('#footnotediv').remove();
            });
        },100);
    },
    divover: function() {
        clearTimeout(Footnotes.footnotetimeout);
        $('#footnotediv').stop();
        $('#footnotediv').css({
                opacity: 0.9
        });
    }
}
</script>
